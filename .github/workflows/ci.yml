name: SuperInstance CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Rust Build & Test
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            superinstance/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cd superinstance && cargo fmt -- --check

      - name: Clippy
        run: cd superinstance && cargo clippy -- -D warnings

      - name: Build
        run: cd superinstance && cargo build --release

      - name: Run tests
        run: cd superinstance && cargo test --release

  # Web Stack (Bun + TypeScript)
  web:
    name: Web Stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Generate Prisma Client
        run: bunx prisma generate

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo audit
        run: |
          cargo install cargo-audit
          cd superinstance && cargo audit

      - name: Check for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  # Documentation
  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README exists
        run: |
          test -f README.md || (echo "Root README.md missing!" && exit 1)
          test -f superinstance/README.md || (echo "SuperInstance README.md missing!" && exit 1)

      - name: Check tutorials exist
        run: |
          test -f docs/tutorials/00-quick-start.md || (echo "Quick start tutorial missing!" && exit 1)
          test -f superinstance/docs/tutorials/00-quick-start.md || (echo "SuperInstance quick start missing!" && exit 1)

      - name: Check examples exist
        run: |
          test -f examples/consultancy/breed.md || (echo "Consultancy example missing!" && exit 1)
          test -f examples/coder/breed.md || (echo "Coder example missing!" && exit 1)
          test -f examples/smart-home/breed.md || (echo "Smart home example missing!" && exit 1)
          test -f examples/maker/breed.md || (echo "Maker example missing!" && exit 1)

  # Binary size enforcement
  binary-size:
    name: Binary Size Check (<5 MB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cd superinstance && cargo build --release

      - name: Check binary size
        run: |
          BINARY="superinstance/target/release/superinstance"
          if [ -f "$BINARY" ]; then
            SIZE=$(stat -c%s "$BINARY")
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "Binary size: $SIZE_MB MB ($SIZE bytes)"
            if [ $SIZE_MB -gt 5 ]; then
              echo "❌ FAIL: Binary size ($SIZE_MB MB) exceeds 5 MB limit!"
              echo "Core must stay under 5 MB. Move heavy deps to backend/."
              exit 1
            else
              echo "✅ PASS: Binary size ($SIZE_MB MB) within 5 MB limit"
            fi
          else
            echo "Binary not found - skipping size check"
          fi
