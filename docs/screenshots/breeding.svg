<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="600" y="50" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">🌙 Night School: TensorRT-LLM Breeding</text>
  <text x="600" y="80" font-family="system-ui, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Geometric Snapping • SLERP/TIES Merging • Deterministic Routing</text>
  
  <!-- Phase Timeline -->
  <g transform="translate(100, 120)">
    <!-- Phase boxes -->
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#7c3aed" opacity="0.3"/>
    <text x="90" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">PHASE 1</text>
    <text x="90" y="45" font-family="system-ui, sans-serif" font-size="13" fill="white" text-anchor="middle">Evaluate</text>
    
    <rect x="220" y="0" width="180" height="60" rx="8" fill="#06b6d4" opacity="0.3"/>
    <text x="310" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#22d3ee" text-anchor="middle">PHASE 2</text>
    <text x="310" y="45" font-family="system-ui, sans-serif" font-size="13" fill="white" text-anchor="middle">Cull</text>
    
    <rect x="440" y="0" width="180" height="60" rx="8" fill="#10b981" opacity="0.5" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="530" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#34d399" text-anchor="middle">PHASE 3</text>
    <text x="530" y="45" font-family="system-ui, sans-serif" font-size="13" fill="white" text-anchor="middle">Breed ⚡</text>
    
    <rect x="660" y="0" width="180" height="60" rx="8" fill="#f59e0b" opacity="0.3"/>
    <text x="750" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">PHASE 4</text>
    <text x="750" y="45" font-family="system-ui, sans-serif" font-size="13" fill="white" text-anchor="middle">Distill</text>
    
    <rect x="880" y="0" width="180" height="60" rx="8" fill="#ef4444" opacity="0.3"/>
    <text x="970" y="25" font-family="system-ui, sans-serif" font-size="11" fill="#f87171" text-anchor="middle">PHASE 5</text>
    <text x="970" y="45" font-family="system-ui, sans-serif" font-size="13" fill="white" text-anchor="middle">Promote</text>
    
    <!-- Connection lines -->
    <line x1="180" y1="30" x2="220" y2="30" stroke="#475569" stroke-width="2"/>
    <line x1="400" y1="30" x2="440" y2="30" stroke="#475569" stroke-width="2"/>
    <line x1="620" y1="30" x2="660" y2="30" stroke="#475569" stroke-width="2"/>
    <line x1="840" y1="30" x2="880" y2="30" stroke="#475569" stroke-width="2"/>
  </g>
  
  <!-- Breeding Visualization -->
  <g transform="translate(100, 220)">
    <!-- Sire (Parent 1) -->
    <rect x="0" y="0" width="280" height="200" rx="12" fill="#1e293b" opacity="0.8"/>
    <text x="140" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">🐂 Sire (Father)</text>
    <text x="140" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Email-Cow-v1 • Fitness: 0.85</text>
    
    <!-- Gene bars -->
    <text x="20" y="90" font-family="system-ui, sans-serif" font-size="10" fill="#a78bfa">polite_tone</text>
    <rect x="120" y="80" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="120" y="80" width="112" height="10" rx="5" fill="url(#purple)"/>
    
    <text x="20" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#22d3ee">json_output</text>
    <rect x="120" y="105" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="120" y="105" width="14" height="10" rx="5" fill="url(#cyan)"/>
    
    <text x="20" y="140" font-family="system-ui, sans-serif" font-size="10" fill="#34d399">concise_style</text>
    <rect x="120" y="130" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="120" y="130" width="70" height="10" rx="5" fill="url(#green)"/>
    
    <text x="20" y="165" font-family="system-ui, sans-serif" font-size="10" fill="#fbbf24">rust_coder</text>
    <rect x="120" y="155" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="120" y="155" width="56" height="10" rx="5" fill="#f59e0b"/>
    
    <text x="20" y="190" font-family="system-ui, sans-serif" font-size="10" fill="#f87171">email_triage</text>
    <rect x="120" y="180" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="120" y="180" width="126" height="10" rx="5" fill="#ef4444"/>
    
    <!-- SLERP Merge Animation -->
    <g transform="translate(300, 50)">
      <text x="100" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">SLERP Merge</text>
      <text x="100" y="20" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Spherical interpolation</text>
      
      <!-- Animated merge visualization -->
      <circle cx="30" cy="60" r="25" fill="#7c3aed" opacity="0.5">
        <animate attributeName="cx" values="30;70;30" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="170" cy="60" r="25" fill="#06b6d4" opacity="0.5">
        <animate attributeName="cx" values="170;130;170" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="60" r="30" fill="#10b981" opacity="0.8" filter="url(#glow)">
        <animate attributeName="r" values="30;40;30" dur="3s" repeatCount="indefinite"/>
      </circle>
      
      <text x="100" y="65" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle">Offspring</text>
      
      <!-- TIES algorithm indicator -->
      <rect x="20" y="100" width="160" height="30" rx="6" fill="#334155" opacity="0.5"/>
      <text x="100" y="120" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">TIES: Trim, Elect Sign, Merge</text>
    </g>
    
    <!-- Dam (Parent 2) -->
    <rect x="520" y="0" width="280" height="200" rx="12" fill="#1e293b" opacity="0.8"/>
    <text x="660" y="30" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">🐄 Dam (Mother)</text>
    <text x="660" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Summary-Cow-v2 • Fitness: 0.78</text>
    
    <!-- Gene bars -->
    <text x="540" y="90" font-family="system-ui, sans-serif" font-size="10" fill="#a78bfa">polite_tone</text>
    <rect x="640" y="80" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="640" y="80" width="56" height="10" rx="5" fill="url(#purple)"/>
    
    <text x="540" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#22d3ee">json_output</text>
    <rect x="640" y="105" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="640" y="105" width="112" height="10" rx="5" fill="url(#cyan)"/>
    
    <text x="540" y="140" font-family="system-ui, sans-serif" font-size="10" fill="#34d399">concise_style</text>
    <rect x="640" y="130" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="640" y="130" width="98" height="10" rx="5" fill="url(#green)"/>
    
    <text x="540" y="165" font-family="system-ui, sans-serif" font-size="10" fill="#fbbf24">summary_gen</text>
    <rect x="640" y="155" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="640" y="155" width="126" height="10" rx="5" fill="#f59e0b"/>
    
    <text x="540" y="190" font-family="system-ui, sans-serif" font-size="10" fill="#f87171">calendar_aware</text>
    <rect x="640" y="180" width="140" height="10" rx="5" fill="#334155"/>
    <rect x="640" y="180" width="84" height="10" rx="5" fill="#ef4444"/>
  </g>
  
  <!-- Offspring Result -->
  <g transform="translate(300, 460)">
    <rect x="0" y="0" width="400" height="180" rx="12" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2"/>
    <text x="200" y="30" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="white" text-anchor="middle">🌱 New Offspring: Email-Summary-Hybrid-v1</text>
    <text x="200" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">Predicted Fitness: 0.82 • LoRA Size: 127 MB</text>
    
    <!-- Merged gene visualization -->
    <g transform="translate(20, 70)">
      <text x="0" y="15" font-family="system-ui, sans-serif" font-size="10" fill="#a78bfa">polite_tone</text>
      <rect x="100" y="5" width="140" height="10" rx="5" fill="#334155"/>
      <rect x="100" y="5" width="84" height="10" rx="5" fill="url(#purple)">
        <animate attributeName="width" values="0;84" dur="1s" fill="freeze"/>
      </rect>
      
      <text x="0" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#22d3ee">json_output</text>
      <rect x="100" y="30" width="140" height="10" rx="5" fill="#334155"/>
      <rect x="100" y="30" width="63" height="10" rx="5" fill="url(#cyan)">
        <animate attributeName="width" values="0;63" dur="1s" fill="freeze" begin="0.2s"/>
      </rect>
      
      <text x="0" y="65" font-family="system-ui, sans-serif" font-size="10" fill="#34d399">concise_style</text>
      <rect x="100" y="55" width="140" height="10" rx="5" fill="#334155"/>
      <rect x="100" y="55" width="84" height="10" rx="5" fill="url(#green)">
        <animate attributeName="width" values="0;84" dur="1s" fill="freeze" begin="0.4s"/>
      </rect>
      
      <text x="260" y="15" font-family="system-ui, sans-serif" font-size="10" fill="#fbbf24">email_triage</text>
      <rect x="360" y="5" width="0" height="10" rx="5" fill="#f59e0b">
        <animate attributeName="width" values="0;98" dur="1s" fill="freeze" begin="0.6s"/>
      </rect>
      
      <text x="260" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#f87171">summary_gen</text>
      <rect x="360" y="30" width="0" height="10" rx="5" fill="#ef4444">
        <animate attributeName="width" values="0;63" dur="1s" fill="freeze" begin="0.8s"/>
      </rect>
    </g>
  </g>
  
  <!-- Geometric Routing Panel -->
  <g transform="translate(750, 220)">
    <rect x="0" y="0" width="350" height="200" rx="12" fill="#1e293b" opacity="0.8"/>
    <text x="175" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">📐 Geometric Routing (constraint-theory)</text>
    
    <!-- Constraint visualization -->
    <g transform="translate(20, 50)">
      <text x="0" y="15" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Intent Vector</text>
      <rect x="100" y="5" width="200" height="12" rx="6" fill="#334155"/>
      <circle cx="150" cy="11" r="5" fill="#10b981">
        <animate attributeName="cx" values="150;250;150" dur="4s" repeatCount="indefinite"/>
      </circle>
      
      <text x="0" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Species Match</text>
      <rect x="100" y="35" width="200" height="12" rx="6" fill="#334155"/>
      <rect x="100" y="35" width="160" height="12" rx="6" fill="url(#green)" opacity="0.7"/>
      
      <text x="0" y="75" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Snap Point</text>
      <rect x="100" y="65" width="200" height="12" rx="6" fill="#334155"/>
      <rect x="255" y="65" width="45" height="12" rx="6" fill="#10b981"/>
      
      <text x="0" y="105" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Route: 🐄 Cattle</text>
      <text x="100" y="105" font-family="system-ui, sans-serif" font-size="10" fill="#10b981">✓ Deterministic in <1ms</text>
    </g>
  </g>
  
  <!-- Performance Stats -->
  <g transform="translate(750, 460)">
    <rect x="0" y="0" width="350" height="180" rx="12" fill="#1e293b" opacity="0.8"/>
    <text x="175" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">📊 Night School Stats</text>
    
    <g transform="translate(20, 50)">
      <text x="0" y="15" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Offspring Created:</text>
      <text x="280" y="15" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="end">3</text>
      
      <text x="0" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">LoRA Merge Time:</text>
      <text x="280" y="40" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="end">4.2s</text>
      
      <text x="0" y="65" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">VRAM Freed:</text>
      <text x="280" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#10b981" text-anchor="end">512 MB</text>
      
      <text x="0" y="90" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Fitness Delta:</text>
      <text x="280" y="90" font-family="system-ui, sans-serif" font-size="14" fill="#10b981" text-anchor="end">+4.2%</text>
      
      <text x="0" y="115" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Next Run:</text>
      <text x="280" y="115" font-family="system-ui, sans-serif" font-size="14" fill="white" text-anchor="end">Tomorrow 02:00</text>
    </g>
  </g>
  
  <!-- Footer -->
  <rect x="0" y="760" width="1200" height="40" fill="#1e293b" opacity="0.5"/>
  <text x="600" y="785" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">TensorRT-LLM + SLERP/TIES + Geometric Routing = 2× Faster Evolution</text>
</svg>